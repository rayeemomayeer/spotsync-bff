openapi: 3.0.3
info:
  title: SpotSync BFF
  version: 0.1.0
  description: Better Auth session API and authenticated proxy to the Go reservation engine.
servers:
  - url: http://localhost:4000
paths:
  /healthz:
    get:
      summary: Liveness
      responses:
        "200":
          description: OK
  /api/auth/{path}:
    parameters:
      - name: path
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Better Auth handler
      responses:
        "200":
          description: Auth response
    post:
      summary: Better Auth handler
      responses:
        "200":
          description: Auth response
  /api/v1/{proxy+}:
    parameters:
      - name: proxy+
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Proxy to Go API with session → JWT bridge
      responses:
        "200":
          description: Upstream response
    post:
      summary: Proxy to Go API
      responses:
        "200":
          description: Upstream response
  /api/stripe/webhook:
    post:
      summary: Stripe test-mode webhook
      responses:
        "200":
          description: Received
  /api/notify:
    post:
      summary: Forward notify event to spotsync-notify (optional)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum:
                    - reservation_confirmed
                    - reservation_cancelled
                    - password_reset
                    - verify_email
                    - org_invite
                email:
                  type: string
                  format: email
      responses:
        "202":
          description: Accepted by notify
        "503":
          description: NOTIFY_URL not configured
