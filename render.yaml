services:
  - type: web
    name: spotsync-bff
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm start
    healthCheckPath: /readyz
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "8080"
      - key: DATABASE_URL
        sync: false
      - key: BETTER_AUTH_SECRET
        generateValue: true
      - key: BETTER_AUTH_URL
        sync: false
      - key: FRONTEND_ORIGIN
        sync: false
      - key: GO_API_BASE_URL
        value: https://spotsync-ei6g.onrender.com
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRY_SECONDS
        value: "300"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: GO_PLATFORM_USER_ID
        value: "1"
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
